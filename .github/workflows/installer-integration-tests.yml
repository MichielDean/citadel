name: installer-integration-tests

# Runs the Docker-based installer test suite whenever files that affect the
# installer are changed.  The suite boots a real systemd container, runs
# ct init / ct doctor / cistern-castellarius.service through the full lifecycle,
# and exits non-zero on any failure.
#
# Run locally with a single command (from the repository root):
#   bash tests/installer/run-local.sh

on:
  pull_request:
    paths:
      - '**/doctor.go'
      - '**/init.go'
      - '**/start-castellarius.sh'
      - 'tests/installer/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  installer-integration-tests:
    # Only run for PRs from within the repository — self-hosted runners and
    # Docker are not available to forked PRs.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15

    env:
      # Unique names per run to avoid collisions on shared self-hosted runners.
      CONTAINER_NAME: cistern-installer-test-${{ github.run_id }}
      IMAGE_TAG: cistern/installer-test:${{ github.run_id }}

    steps:
      - name: Check disk space
        run: |
          DISK_USED_PCT=$(df --output=pcent "$GITHUB_WORKSPACE" | tail -1 | tr -d ' %')
          DISK_FREE_PCT=$((100 - DISK_USED_PCT))
          DISK_FREE_HUMAN=$(df -h "$GITHUB_WORKSPACE" | tail -1 | awk '{print $4}')
          echo "Disk free: ${DISK_FREE_PCT}% (${DISK_FREE_HUMAN}) on $(df --output=source "$GITHUB_WORKSPACE" | tail -1)"
          if [ "${DISK_FREE_PCT}" -lt 10 ]; then
            echo "::error::Disk space critical: only ${DISK_FREE_PCT}% free on runner. Clean up runner disk before retrying."
            df -h
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build installer test image
        # CISTERN_TEST_IMAGE overrides the default tag so concurrent runs on the
        # same runner build and use isolated images.
        run: CISTERN_TEST_IMAGE="${IMAGE_TAG}" bash tests/installer/build.sh

      - name: Run installer integration tests
        run: |
          # Flags required for systemd to run as PID 1 in Docker on Linux 5.10+:
          # --privileged: grants all Linux capabilities.
          # --cgroupns=host: use host cgroup namespace so systemd can manage
          #   service cgroups (removing this causes 200ms exit on cgroupv2).
          # -v /sys/fs/cgroup:/sys/fs/cgroup:rw: explicit rw mount so systemd
          #   can write to the unified cgroupv2 hierarchy.
          # --tmpfs /run --tmpfs /run/lock: writable tmpfs for systemd runtime.
          # --security-opt apparmor=unconfined: Docker's AppArmor profile blocks
          #   syscalls systemd needs; --privileged alone does not disable it.
          docker run \
            --privileged \
            --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --tmpfs /run \
            --tmpfs /run/lock \
            --security-opt apparmor=unconfined \
            -d \
            --name "${CONTAINER_NAME}" \
            "${IMAGE_TAG}"

          # Wait up to 15 s for the container to stabilise and verify it stays
          # running for 2 consecutive seconds (systemd init can take a moment).
          # If it exits early, capture logs and surface them as ::error::.
          _stable=0
          for _i in $(seq 1 15); do
            _status=$(docker inspect "${CONTAINER_NAME}" \
                        --format '{{.State.Status}}' 2>/dev/null || echo gone)
            if [ "${_status}" = "running" ]; then
              _stable=$((_stable + 1))
              if [ "${_stable}" -ge 2 ]; then
                break
              fi
            else
              _stable=0
              if [ "${_status}" = "exited" ] || [ "${_status}" = "gone" ]; then
                _exit_code=$(docker inspect "${CONTAINER_NAME}" \
                               --format '{{.State.ExitCode}}' 2>/dev/null || echo unknown)
                echo "::error::container exited before tests ran (exit_code=${_exit_code})"
                echo "=== container logs ==="
                docker logs "${CONTAINER_NAME}" 2>&1 || true
                exit 1
              fi
            fi
            sleep 1
          done

          # Capture output while preserving run-tests.sh exit code.
          # The script exits 0 on full pass, 1 if any test fails.
          set +e
          OUTPUT_FILE="/tmp/installer-test-output-${GITHUB_RUN_ID}.txt"
          docker exec "${CONTAINER_NAME}" /usr/local/bin/run-tests.sh \
            | tee "${OUTPUT_FILE}"
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          docker stop "${CONTAINER_NAME}" || true

          # If the test runner exit code indicates the container crashed (not a
          # test failure), emit container logs to surface the systemd error.
          if [ "${TEST_EXIT_CODE}" -gt 1 ]; then
            echo "::error::docker exec failed (exit_code=${TEST_EXIT_CODE}) — container may have crashed"
            echo "=== container logs ==="
            docker logs "${CONTAINER_NAME}" 2>&1 || true
          fi

          # Emit ::error:: annotations for each [FAIL] line so GitHub renders
          # them as visible errors in the Actions log and PR checks UI.
          if [ -f "${OUTPUT_FILE}" ]; then
            while IFS= read -r line; do
              if [[ "${line}" == "[FAIL]"* ]]; then
                detail="${line#\[FAIL\] }"
                echo "::error::${detail}"
              fi
            done < "${OUTPUT_FILE}"
          fi

          exit ${TEST_EXIT_CODE}

      - name: Clean up test container and image
        if: always()
        run: |
          docker stop "${CONTAINER_NAME}" 2>/dev/null || true
          docker rm "${CONTAINER_NAME}" 2>/dev/null || true
          docker rmi "${IMAGE_TAG}" 2>/dev/null || true
          rm -f "/tmp/installer-test-output-${GITHUB_RUN_ID}.txt"
          RUNNER_ROOT="$(realpath "$GITHUB_WORKSPACE/../../..")"
          for dir in _update _diag; do
            TARGET="${RUNNER_ROOT}/${dir}"
            if [ -d "${TARGET}" ]; then
              echo "Cleaning ${dir} entries older than 1 day from ${TARGET}"
              find "${TARGET}" -maxdepth 1 -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
            fi
          done
