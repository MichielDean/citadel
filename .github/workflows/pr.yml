name: PR

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

on:
  pull_request:

jobs:
  build:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Check disk space
        run: |
          DISK_USED_PCT=$(df --output=pcent "$GITHUB_WORKSPACE" | tail -1 | tr -d ' %')
          DISK_FREE_PCT=$((100 - DISK_USED_PCT))
          DISK_FREE_HUMAN=$(df -h "$GITHUB_WORKSPACE" | tail -1 | awk '{print $4}')
          echo "Disk free: ${DISK_FREE_PCT}% (${DISK_FREE_HUMAN}) on $(df --output=source "$GITHUB_WORKSPACE" | tail -1)"
          if [ "${DISK_FREE_PCT}" -lt 10 ]; then
            echo "::error::Disk space critical: only ${DISK_FREE_PCT}% free on runner. Clean up runner disk before retrying."
            df -h
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install deps
        run: go mod download

      - name: vet
        run: go vet ./...

      - name: Build
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          go build -ldflags "-X main.version=${COMMIT} -X main.commit=${COMMIT}" ./...

      - name: Test
        run: go test ./... -v

      - name: Clean up runner _update and _diag
        if: always()
        run: |
          RUNNER_ROOT="$(realpath "$GITHUB_WORKSPACE/../../..")"
          for dir in _update _diag; do
            TARGET="${RUNNER_ROOT}/${dir}"
            if [ -d "${TARGET}" ]; then
              echo "Cleaning ${dir} entries older than 1 day from ${TARGET}"
              find "${TARGET}" -maxdepth 1 -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
            fi
          done

  installer-tests:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Check disk space
        run: |
          DISK_USED_PCT=$(df --output=pcent "$GITHUB_WORKSPACE" | tail -1 | tr -d ' %')
          DISK_FREE_PCT=$((100 - DISK_USED_PCT))
          DISK_FREE_HUMAN=$(df -h "$GITHUB_WORKSPACE" | tail -1 | awk '{print $4}')
          echo "Disk free: ${DISK_FREE_PCT}% (${DISK_FREE_HUMAN}) on $(df --output=source "$GITHUB_WORKSPACE" | tail -1)"
          if [ "${DISK_FREE_PCT}" -lt 10 ]; then
            echo "::error::Disk space critical: only ${DISK_FREE_PCT}% free on runner. Clean up runner disk before retrying."
            df -h
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Check if installer files changed
        id: installer_changed
        run: |
          BASE="${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "origin/${BASE}...HEAD" -- \
            'cmd/ct/doctor.go' \
            'cmd/ct/init.go' \
            'cmd/ct/assets/start-castellarius.sh' \
            'start-castellarius.sh' \
            'run-installer-tests.sh' \
            'test/installer/**' \
            'test/docker/**' \
            'tests/installer/**' \
            'internal/testutil/fakeagent/**' \
            || true)
          if [ -z "${CHANGED}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No installer-related files changed — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Installer files changed:"
            echo "${CHANGED}"
          fi

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: steps.installer_changed.outputs.skip != 'true'
        with:
          go-version-file: go.mod
          cache: false

      - name: Build Go binaries
        if: steps.installer_changed.outputs.skip != 'true'
        run: go build ./...

      - name: Run installer tests
        if: steps.installer_changed.outputs.skip != 'true'
        run: ./run-installer-tests.sh

      - name: Upload container logs
        if: failure() && steps.installer_changed.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installer-test-logs
          path: |
            installer-test-container.log
          retention-days: 7

      - name: Clean up runner _update and _diag
        if: always()
        run: |
          RUNNER_ROOT="$(realpath "$GITHUB_WORKSPACE/../../..")"
          for dir in _update _diag; do
            TARGET="${RUNNER_ROOT}/${dir}"
            if [ -d "${TARGET}" ]; then
              echo "Cleaning ${dir} entries older than 1 day from ${TARGET}"
              find "${TARGET}" -maxdepth 1 -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
            fi
          done

  installer-integration-tests:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15

    env:
      CONTAINER_NAME: cistern-installer-test-${{ github.run_id }}
      IMAGE_TAG: cistern/installer-test:${{ github.run_id }}

    steps:
      - name: Check disk space
        run: |
          DISK_USED_PCT=$(df --output=pcent "$GITHUB_WORKSPACE" | tail -1 | tr -d ' %')
          DISK_FREE_PCT=$((100 - DISK_USED_PCT))
          DISK_FREE_HUMAN=$(df -h "$GITHUB_WORKSPACE" | tail -1 | awk '{print $4}')
          echo "Disk free: ${DISK_FREE_PCT}% (${DISK_FREE_HUMAN}) on $(df --output=source "$GITHUB_WORKSPACE" | tail -1)"
          if [ "${DISK_FREE_PCT}" -lt 10 ]; then
            echo "::error::Disk space critical: only ${DISK_FREE_PCT}% free on runner. Clean up runner disk before retrying."
            df -h
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check if installer files changed
        id: installer_changed
        run: |
          BASE="${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "origin/${BASE}...HEAD" -- \
            '**/doctor.go' \
            '**/init.go' \
            '**/start-castellarius.sh' \
            'tests/installer/**' \
            || true)
          if [ -z "${CHANGED}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No installer-related files changed — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Installer files changed:"
            echo "${CHANGED}"
          fi

      - name: Build installer test image
        if: steps.installer_changed.outputs.skip != 'true'
        run: CISTERN_TEST_IMAGE="${IMAGE_TAG}" bash tests/installer/build.sh

      - name: Run installer integration tests
        if: steps.installer_changed.outputs.skip != 'true'
        run: |
          docker run \
            --privileged \
            --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --tmpfs /run \
            --tmpfs /run/lock \
            --security-opt apparmor=unconfined \
            -d \
            --name "${CONTAINER_NAME}" \
            "${IMAGE_TAG}"

          _stable=0
          for _i in $(seq 1 15); do
            _status=$(docker inspect "${CONTAINER_NAME}" \
                        --format '{{.State.Status}}' 2>/dev/null || echo gone)
            if [ "${_status}" = "running" ]; then
              _stable=$((_stable + 1))
              if [ "${_stable}" -ge 2 ]; then
                break
              fi
            else
              _stable=0
              if [ "${_status}" = "exited" ] || [ "${_status}" = "gone" ]; then
                _exit_code=$(docker inspect "${CONTAINER_NAME}" \
                               --format '{{.State.ExitCode}}' 2>/dev/null || echo unknown)
                echo "::error::container exited before tests ran (exit_code=${_exit_code})"
                echo "=== container logs ==="
                docker logs "${CONTAINER_NAME}" 2>&1 || true
                exit 1
              fi
            fi
            sleep 1
          done

          set +e
          OUTPUT_FILE="/tmp/installer-test-output-${GITHUB_RUN_ID}.txt"
          docker exec "${CONTAINER_NAME}" /usr/local/bin/run-tests.sh \
            | tee "${OUTPUT_FILE}"
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          docker stop "${CONTAINER_NAME}" || true

          if [ "${TEST_EXIT_CODE}" -gt 1 ]; then
            echo "::error::docker exec failed (exit_code=${TEST_EXIT_CODE}) — container may have crashed"
            echo "=== container logs ==="
            docker logs "${CONTAINER_NAME}" 2>&1 || true
          fi

          if [ -f "${OUTPUT_FILE}" ]; then
            while IFS= read -r line; do
              if [[ "${line}" == "[FAIL]"* ]]; then
                detail="${line#\[FAIL\] }"
                echo "::error::${detail}"
              fi
            done < "${OUTPUT_FILE}"
          fi

          exit ${TEST_EXIT_CODE}

      - name: Clean up test container and image
        if: always() && steps.installer_changed.outputs.skip != 'true'
        run: |
          docker stop "${CONTAINER_NAME}" 2>/dev/null || true
          docker rm "${CONTAINER_NAME}" 2>/dev/null || true
          docker rmi "${IMAGE_TAG}" 2>/dev/null || true
          rm -f "/tmp/installer-test-output-${GITHUB_RUN_ID}.txt"

      - name: Clean up runner _update and _diag
        if: always()
        run: |
          RUNNER_ROOT="$(realpath "$GITHUB_WORKSPACE/../../..")"
          for dir in _update _diag; do
            TARGET="${RUNNER_ROOT}/${dir}"
            if [ -d "${TARGET}" ]; then
              echo "Cleaning ${dir} entries older than 1 day from ${TARGET}"
              find "${TARGET}" -maxdepth 1 -mindepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
            fi
          done