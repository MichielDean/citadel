# Cistern configuration
# Water is life. Code is water. The Cistern keeps it moving.
#
# Repos flow through aqueducts. Cataracta operators process droplets along the way.
# Work items are droplets. The cistern holds them until they flow free.

repos:
  - name: ScaledTest
    url: https://github.com/example/ScaledTest
    workflow_path: aqueduct/feature.yaml
    cataractae: 2
    # Cataracta operator names — who processes the droplets
    names:
      - virgo
      - marcia
    prefix: st

  - name: cistern
    url: https://github.com/example/cistern
    workflow_path: aqueduct/feature.yaml
    cataractae: 2
    names:
      - virgo
      - marcia
    prefix: ct

max_cataractae: 4
handoff_token_threshold: 100000

# heartbeat_interval controls how often the Castellarius scans for orphaned or
# stalled in-progress sessions and resets / re-adopts them. Accepts Go duration
# strings. Shorter values make recovery faster; longer values reduce overhead.
# Default: 30s
heartbeat_interval: 30s

# Drought protocols — run automatically when the Cistern is idle
drought_hooks:
  - name: sync-cataractae
    action: cataractae_generate # Regenerate role files when workflow YAML is newer

  - name: prune-worktrees
    action: worktree_prune # Prune stale aqueduct registrations


