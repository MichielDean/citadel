name: feature

complexity:
  standard:
    level: 1
  full:
    level: 2
  critical:
    level: 3

cataractae:
  - name: implement
    type: agent
    identity: implementer
    model: sonnet       # optional: any value accepted by claude CLI (e.g. sonnet, opus, haiku); omit to use agent default
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: cistern-github
        path: skills/cistern-github/SKILL.md
    timeout_minutes: 30
    on_pass: simplify
    on_fail: pooled
    on_pool: human

  - name: simplify
    type: agent
    identity: simplifier
    model: opus         # stronger model for deep refactoring
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: code-simplifier
        path: skills/code-simplifier/SKILL.md
    timeout_minutes: 20
    on_pass: review
    on_fail: implement
    on_recirculate: implement
    on_pool: human

  - name: review
    type: agent
    identity: reviewer
    model: opus         # adversarial reviewer benefits from the strongest available model
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: critical-code-reviewer
        path: skills/critical-code-reviewer/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: cistern-github
        path: skills/cistern-github/SKILL.md
      - name: reviewer
        path: skills/reviewer/SKILL.md
    timeout_minutes: 15
    on_pass: qa
    on_fail: implement
    on_recirculate: implement
    on_pool: human

  - name: qa
    type: agent
    identity: qa
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 20
    on_pass: security-review
    on_fail: implement
    on_recirculate: implement
    on_pool: human

  - name: security-review
    type: agent
    identity: security
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
    timeout_minutes: 15
    on_pass: docs
    on_fail: implement
    on_recirculate: implement
    on_pool: human

  - name: docs
    type: agent
    identity: docs_writer
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 20
    on_pass: delivery
    on_fail: implement
    on_recirculate: implement
    on_pool: human

  - name: delivery
    type: agent
    identity: delivery
    skills:
      - name: cistern-github
        path: skills/cistern-github/SKILL.md
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 60
    on_pass: done
    on_recirculate: implement
    on_pool: human
