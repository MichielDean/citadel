name: feature

complexity:
  trivial:
    level: 1
    skip_cataractae: [review, qa, docs]
  standard:
    level: 2
    skip_cataractae: [qa]
  full:
    level: 3
    skip_cataractae: []
  critical:
    level: 4
    skip_cataractae: []
    require_human: true

cataractae:
  - name: implement
    type: agent
    identity: implementer
    model: sonnet       # optional: any value accepted by claude CLI (e.g. sonnet, opus, haiku); omit to use agent default
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: cistern-github
        path: skills/cistern-github/SKILL.md
    timeout_minutes: 30
    on_pass: simplify
    on_fail: blocked
    on_escalate: human

  - name: simplify
    type: agent
    identity: simplifier
    model: opus         # stronger model for deep refactoring
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: code-simplifier
        path: skills/code-simplifier/SKILL.md
    timeout_minutes: 20
    skip_for: [1] # trivial droplets skip simplification
    on_pass: review
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: review
    type: agent
    identity: reviewer
    model: opus         # adversarial reviewer benefits from the strongest available model
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: critical-code-reviewer
        path: skills/critical-code-reviewer/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: cistern-github
        path: skills/cistern-github/SKILL.md
      - name: adversarial-reviewer
        path: skills/adversarial-reviewer/SKILL.md
    timeout_minutes: 15
    skip_for: [1] # trivial droplets skip this cataractae
    on_pass: qa
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: qa
    type: agent
    identity: qa
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 20
    skip_for: [1, 2] # trivial and standard droplets skip this cataractae
    on_pass: security-review
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: security-review
    type: agent
    identity: security
    model: sonnet
    context: diff_only
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
    timeout_minutes: 15
    skip_for: [1, 2, 3] # only critical droplets run security review
    on_pass: docs
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: docs
    type: agent
    identity: docs_writer
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 20
    skip_for: [1] # trivial droplets skip docs
    on_pass: delivery
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: delivery
    type: agent
    identity: delivery
    skills:
      - name: cistern-github
        path: skills/cistern-github/SKILL.md
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 60
    on_pass: done
    on_recirculate: implement
    on_escalate: human
