name: feature
steps:
  - name: implement
    type: agent
    role: implementer
    model: sonnet
    context: full_codebase
    max_iterations: 3
    timeout_minutes: 30
    on_pass: adversarial-review
    on_fail: blocked
    on_escalate: human

  - name: adversarial-review
    type: agent
    role: reviewer
    model: sonnet
    context: diff_only
    timeout_minutes: 15
    on_pass: qa
    on_fail: implement
    on_revision: implement
    on_escalate: human

  - name: qa
    type: agent
    role: qa
    model: haiku
    context: full_codebase
    timeout_minutes: 20
    on_pass: pr-create
    on_fail: implement
    on_escalate: human

  - name: pr-create
    type: automated
    timeout_minutes: 5
    on_pass: ci-gate
    on_fail: human

  - name: ci-gate
    type: automated
    timeout_minutes: 30
    on_pass: merge
    on_fail: implement
    on_escalate: human

  - name: merge
    type: automated
    timeout_minutes: 5
    on_pass: done
    on_fail: human
