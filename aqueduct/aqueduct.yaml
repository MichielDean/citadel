name: feature

complexity:
  trivial:
    level: 1
    skip_cataractae: [adversarial-review, qa, docs]
  standard:
    level: 2
    skip_cataractae: [qa]
  full:
    level: 3
    skip_cataractae: []
  critical:
    level: 4
    skip_cataractae: []
    require_human: true

cataractae:
  - name: implement
    type: agent
    identity: implementer
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
      - name: cistern-git
      - name: github-workflow
    timeout_minutes: 30
    on_pass: simplify
    on_fail: blocked
    on_escalate: human

  - name: simplify
    type: agent
    identity: simplifier
    model: opus
    context: full_codebase
    skills:
      - name: cistern-droplet-state
      - name: cistern-git
      - name: code-simplifier
    timeout_minutes: 20
    skip_for: [1] # trivial droplets skip simplification
    on_pass: adversarial-review
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: adversarial-review
    type: agent
    identity: reviewer
    model: sonnet
    context: diff_only
    skills:
      - name: cistern-droplet-state
      - name: critical-code-reviewer
      - name: cistern-git
      - name: github-workflow
      - name: adversarial-reviewer
    timeout_minutes: 15
    skip_for: [1] # trivial droplets skip this cataractae
    on_pass: qa
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: qa
    type: agent
    identity: qa
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
      - name: cistern-git
    timeout_minutes: 20
    skip_for: [1, 2] # trivial and standard droplets skip this cataractae
    on_pass: security-review
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: security-review
    type: agent
    identity: security
    model: sonnet
    context: diff_only
    skills:
      - name: cistern-droplet-state
    timeout_minutes: 15
    skip_for: [1, 2, 3] # only critical droplets run security review
    on_pass: docs
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: docs
    type: agent
    identity: docs_writer
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
      - name: cistern-git
    timeout_minutes: 20
    skip_for: [1] # trivial droplets skip docs
    on_pass: delivery
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: delivery
    type: agent
    identity: delivery
    skills:
      - name: github-workflow
      - name: cistern-droplet-state
      - name: cistern-git
    timeout_minutes: 60
    on_pass: done
    on_recirculate: implement
    on_escalate: human
