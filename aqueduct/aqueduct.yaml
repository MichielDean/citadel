name: feature

cataractae_definitions:
  implementer:
    name: Implementer
    description: "Expert software engineer implementing features using TDD."
    # persona loaded from cataractae/implementer/PERSONA.md
    # instructions loaded from cataractae/implementer/INSTRUCTIONS.md

  simplifier:
    name: Code Simplifier
    description: "Refines recently-written code for clarity, consistency, and maintainability without changing behaviour."
    # persona loaded from cataractae/simplifier/PERSONA.md
    # instructions loaded from cataractae/simplifier/INSTRUCTIONS.md

  reviewer:
    name: Adversarial Reviewer
    description: "Rigorous code reviewer — finds problems in diffs with zero tolerance for mediocrity."
    # persona loaded from cataractae/reviewer/PERSONA.md
    # instructions loaded from cataractae/reviewer/INSTRUCTIONS.md

  qa:
    name: QA Reviewer
    description: "Adversarial QA engineer — active verification, last line of defence before PR."
    # persona loaded from cataractae/qa/PERSONA.md
    # instructions loaded from cataractae/qa/INSTRUCTIONS.md

  security:
    name: Security Reviewer
    description: "Security-focused reviewer — audits diffs for vulnerabilities."
    # persona loaded from cataractae/security/PERSONA.md
    # instructions loaded from cataractae/security/INSTRUCTIONS.md

  docs_writer:
    name: Docs Writer
    description: "Updates documentation for all user-visible changes in the diff."
    # persona loaded from cataractae/docs_writer/PERSONA.md
    # instructions loaded from cataractae/docs_writer/INSTRUCTIONS.md

  delivery:
    name: Delivery
    description: "Owns everything from branch to merged — rebase, PR, CI, conflicts, merge."
    instructions: |
      You are the Delivery cataractae. You own everything from branch to merged.
      Fix whatever is in the way. Do not recirculate for CI failures or merge conflicts — resolve them.

      ## Step 0 — Pre-flight

      ```bash
      go mod tidy
      go build ./...
      ```
      If go mod tidy changed go.mod/go.sum:
      ```bash
      git add go.mod go.sum -- ':!CONTEXT.md' && git commit -m "chore: go mod tidy"
      ```
      If go build fails: fix it before touching git. A broken build should not reach a PR.

      ## Step 1 — Extract droplet ID and branch

      ```bash
      DROPLET_ID=$(grep '^## Item:' CONTEXT.md | awk '{print $3}')
      BRANCH=$(git branch --show-current)
      BASE=main
      echo "Delivering $DROPLET_ID from $BRANCH"
      ```

      Do NOT git stash. Per-droplet worktrees are clean by design. Stashing discards
      uncommitted work from prior cataractae silently.

      ## Step 2 — Rebase

      ```bash
      git fetch origin $BASE
      git rebase origin/$BASE
      ```

      If conflicts arise, resolve them — see Conflict Resolution below.
      After clean rebase:
      ```bash
      go build ./... && go test ./...
      git push --force-with-lease origin $BRANCH
      ```

      ## Conflict Resolution

      Most conflicts are additive: HEAD added X, this branch adds Y. Keep both.

      ```bash
      git diff --name-only --diff-filter=U   # see conflicted files
      ```

      For each file:
      1. Understand what HEAD added and what this branch adds
      2. Keep both sets of additions — never discard the branch's work
      3. Verify: go build ./...

      After resolving all files:
      ```bash
      git rebase --continue
      go build ./... && go test ./...
      git push --force-with-lease origin $BRANCH
      ```

      ## Step 3 — Open or locate the PR

      ```bash
      PR_TITLE=$(grep '^\*\*Title:\*\*' CONTEXT.md | sed 's/\*\*Title:\*\* //')
      PR_URL=$(gh pr create \
        --title "$PR_TITLE" \
        --body "Closes droplet $DROPLET_ID." \
        --base $BASE --head $BRANCH 2>&1) || true

      if echo "$PR_URL" | grep -q "already exists"; then
        PR_URL=$(gh pr view $BRANCH --json url --jq '.url')
      fi
      echo "PR: $PR_URL"
      ```

      ## Step 4 — CI and review

      ```bash
      gh pr checks "$PR_URL"
      ```

      Fix failures:
      - Compile error → fix code, go build ./..., commit, push
      - Test failure → fix test or code, go test ./..., commit, push
      - Flaky test → gh run rerun <run_id> and wait for result
      - Merge conflict detected by CI → rebase again (Step 2) and push
      - Unresolved review comment → address it, commit, push

      After each fix:
      ```bash
      git add -A -- ':!CONTEXT.md' && git commit -m "fix: <specific issue>" && git push
      ```

      Wait for all checks to pass before merging.

      ## Step 5 — Merge

      ```bash
      git fetch origin && git rebase origin/$BASE && git push --force-with-lease
      gh pr merge "$PR_URL" --squash --delete-branch
      gh pr view "$PR_URL" --json state --jq '.state'   # must be "MERGED"
      ```

      ## Step 6 — Signal

      Only after MERGED is confirmed:
      ```bash
      ct droplet pass $DROPLET_ID --notes "Delivered: $PR_URL — <one-line summary>"
      ```

      If merge is impossible after exhausting all options:
      ```bash
      ct droplet block $DROPLET_ID --notes "Cannot merge: <exact reason> — $PR_URL"
      ```

      ## Rules
      - Never signal pass until gh pr view confirms state == "MERGED"
      - Never discard branch additions in conflicts — always keep both sides
      - go build + go test must pass before every push
      - Fix CI, conflicts, and review comments yourself — do not recirculate for these
      - Recirculate only if the feature itself is fundamentally broken and cannot be fixed in delivery

complexity:
  trivial:
    level: 1
    skip_cataractae: [adversarial-review, qa, docs]
  standard:
    level: 2
    skip_cataractae: [qa]
  full:
    level: 3
    skip_cataractae: []
  critical:
    level: 4
    skip_cataractae: []
    require_human: true

cataractae:
  - name: implement
    type: agent
    identity: implementer
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: github-workflow
        path: skills/github-workflow/SKILL.md
    timeout_minutes: 30
    on_pass: simplify
    on_fail: blocked
    on_escalate: human

  - name: simplify
    type: agent
    identity: simplifier
    model: opus
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: code-simplifier
        path: skills/code-simplifier/SKILL.md
    timeout_minutes: 20
    skip_for: [1] # trivial droplets skip simplification
    on_pass: adversarial-review
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: adversarial-review
    type: agent
    identity: reviewer
    model: sonnet
    context: diff_only
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: critical-code-reviewer
        path: skills/critical-code-reviewer/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
      - name: github-workflow
        path: skills/github-workflow/SKILL.md
      - name: adversarial-reviewer
        path: skills/adversarial-reviewer/SKILL.md
    timeout_minutes: 15
    skip_for: [1] # trivial droplets skip this cataractae
    on_pass: qa
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: qa
    type: agent
    identity: qa
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 20
    skip_for: [1, 2] # trivial and standard droplets skip this cataractae
    on_pass: security-review
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: security-review
    type: agent
    identity: security
    model: sonnet
    context: diff_only
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
    timeout_minutes: 15
    skip_for: [1, 2, 3] # only critical droplets run security review
    on_pass: docs
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: docs
    type: agent
    identity: docs_writer
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 20
    skip_for: [1] # trivial droplets skip docs
    on_pass: delivery
    on_fail: implement
    on_recirculate: implement
    on_escalate: human

  - name: delivery
    type: agent
    identity: delivery
    skills:
      - name: github-workflow
        path: skills/github-workflow/SKILL.md
      - name: cistern-droplet-state
        path: skills/cistern-droplet-state/SKILL.md
      - name: cistern-git
        path: skills/cistern-git/SKILL.md
    timeout_minutes: 60
    on_pass: done
    on_recirculate: implement
    on_escalate: human
