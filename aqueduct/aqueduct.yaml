name: feature

complexity:
  standard:
    level: 1
  full:
    level: 2
  critical:
    level: 3

cataractae:
  - name: implement
    type: agent
    identity: implementer
    model: sonnet       # optional: any value accepted by claude CLI (e.g. sonnet, opus, haiku); omit to use agent default
    context: full_codebase
    skills:
      - name: cistern-droplet-state
      - name: cistern-git
      - name: cistern-github
    timeout_minutes: 30
    on_pass: simplify
    on_fail: pooled
    on_pool: pooled

  - name: simplify
    type: agent
    identity: simplifier
    model: sonnet       # pattern recognition + refactoring — Sonnet 4.6 is sufficient, Opus is overkill
    context: full_codebase
    skills:
      - name: cistern-droplet-state
      - name: cistern-git
      - name: code-simplifier
    timeout_minutes: 20
    on_pass: review
    on_fail: implement
    on_recirculate: implement
    on_pool: pooled

  - name: review
    type: agent
    identity: reviewer
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
      - name: cistern-reviewer
      - name: cistern-git
      - name: cistern-github
    timeout_minutes: 15
    on_pass: qa
    on_fail: implement
    on_recirculate: implement
    on_pool: pooled

  - name: qa
    type: agent
    identity: qa
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
      - name: cistern-git
    timeout_minutes: 20
    on_pass: security-review
    on_fail: implement
    on_recirculate: implement
    on_pool: pooled

  - name: security-review
    type: agent
    identity: security
    model: sonnet
    context: full_codebase
    skills:
      - name: cistern-droplet-state
    timeout_minutes: 15
    on_pass: docs
    on_fail: implement
    on_recirculate: implement
    on_pool: pooled

  - name: docs
    type: agent
    identity: docs_writer
    model: haiku        # mechanical copy-editing task — read diff, update .md files, no deep reasoning needed
    context: full_codebase
    skills:
      - name: cistern-droplet-state
      - name: cistern-git
    timeout_minutes: 20
    on_pass: delivery
    on_fail: implement
    on_recirculate: implement
    on_pool: pooled

  - name: delivery
    type: agent
    identity: delivery
    model: haiku        # scripted PR creation checklist — mechanical, no reasoning required
    skills:
      - name: cistern-github
      - name: cistern-droplet-state
      - name: cistern-git
    timeout_minutes: 60
    on_pass: done
    on_recirculate: implement
    on_pool: pooled
