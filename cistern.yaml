# Cistern configuration
# Water is life. Code is water. The Cistern keeps it moving.
#
# Repos flow through aqueducts. Cataractae operators process droplets along the way.
# Work items are droplets. The cistern holds them until they flow free.

repos:
  - name: ScaledTest
    url: https://github.com/example/ScaledTest
    workflow_path: aqueduct/aqueduct.yaml
    cataractae: 2
    # Cataractae operator names — who processes the droplets
    names:
      - upstream
      - tributary
    prefix: st

  - name: cistern
    url: https://github.com/example/cistern
    workflow_path: aqueduct/aqueduct.yaml
    cataractae: 2
    names:
      - seep
      - confluence
    prefix: ct

max_cataractae: 4
handoff_token_threshold: 100000

# rate_limit configures the delivery cataractae API endpoint.
# Limits are applied per source IP and per auth token within a sliding window.
# Omit this section to use built-in defaults (60 req/min per IP, 120 req/min per token).
# rate_limit:
#   per_ip_requests: 60       # max requests per window per source IP
#   per_token_requests: 120   # max requests per window per auth token
#   window: 1m                # sliding window duration (Go duration string)

# heartbeat_interval controls how often the Castellarius scans for orphaned or
# stalled in-progress sessions and evaluates three activity signals to detect
# stalls. Accepts Go duration strings. Shorter values make recovery faster;
# longer values reduce overhead. Default: 30s
heartbeat_interval: 30s

# stall_threshold_minutes configures how many minutes of inactivity across all
# three progress signals (newest note timestamp, worktree file mtime, session log
# mtime) must elapse before a droplet is considered stalled. When a droplet is
# detected as stalled for the first time, a diagnostic note is appended and a
# warning is logged. Further notes are suppressed until one of the signals
# advances. Default: 45
# stall_threshold_minutes: 45

# drain_timeout_minutes configures the graceful shutdown drain timeout. When
# Castellarius receives SIGTERM, it stops accepting new work but continues
# running the observe loop until all in-progress droplets have signaled an
# outcome, or until this timeout fires (whichever comes first). On timeout,
# Castellarius exits and logs the IDs of any still-running sessions.
# Must be properly sized relative to systemd's TimeoutStopSec:
#   TimeoutStopSec >= drain_timeout_minutes + buffer (e.g., 360 for 5 min drain + 60 sec buffer)
# Default: 5
# drain_timeout_minutes: 5

# Drought protocols — run automatically when the Cistern is idle
drought_hooks:
  - name: sync-workflow
    action: git_sync            # Pull latest aqueduct.yaml from origin/main → auto-deploys new cataractae
    restart_if_updated: true    # Exit cleanly after sync so supervisor restarts with new workflow

  - name: sync-cataractae
    action: cataractae_generate # Regenerate CLAUDE.md files from updated workflow YAML

  - name: prune-worktrees
    action: worktree_prune      # Prune stale aqueduct registrations

  - name: vacuum-db
    action: db_vacuum           # Compact the cistern database (SQLite VACUUM)

  - name: prune-events
    action: events_prune        # Remove events older than 30 days
    keep_days: 30

  - name: cleanup-tmp
    action: tmp_cleanup         # Remove stale ct-diff/ct-review temp dirs (>2h old)
