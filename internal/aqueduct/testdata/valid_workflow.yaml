name: feature
cataractae:
  - name: implement
    type: agent
    identity: implementer
    model: sonnet
    context: full_codebase
    max_iterations: 3
    timeout_minutes: 30
    on_pass: review
    on_fail: pooled

  - name: review
    type: agent
    identity: reviewer
    model: sonnet
    context: diff_only
    on_pass: qa
    on_recirculate: implement
    on_pool: human

  - name: qa
    type: agent
    identity: qa
    model: haiku
    context: full_codebase
    on_pass: merge
    on_fail: implement

  - name: merge
    type: automated
    on_pass: done
    on_fail: human
